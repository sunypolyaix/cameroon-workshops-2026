<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ── Reset & base ───────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 0;
      background: #ffffff;
      color: #1a1a1a;
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 1rem;
      line-height: 1.65;
    }

    /* ── Site header / nav bar ──────────────────────────────── */
    .site-header {
      background: #002C73;         /* SUNY Blue PMS 288 */
      border-bottom: 3px solid #EDA900;  /* SUNY Gold accent — decorative only */
    }

    .site-header-inner {
      max-width: 760px;
      margin: 0 auto;
      padding: 0 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      min-height: 3rem;
    }

    .site-title {
      font-family: 'DM Sans', Helvetica, Arial, sans-serif;
      font-size: .78rem;
      font-weight: 500;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: #ffffff;             /* white on #002C73 = ~8:1 — passes WCAG AA */
      text-decoration: none;
      white-space: nowrap;
    }
    .site-title:hover { color: #f0f4ff; }

    nav {
      display: flex;
      gap: .25rem;
      flex-wrap: wrap;
    }

    nav a {
      font-family: 'DM Sans', Helvetica, Arial, sans-serif;
      font-size: .78rem;
      font-weight: 400;
      color: #c8d8f8;             /* light blue-white on #002C73 = ~5.2:1 — passes AA */
      text-decoration: none;
      padding: .55rem .6rem;
      border-radius: 3px;
      transition: background .15s, color .15s;
    }
    nav a:hover, nav a:focus {
      background: rgba(255,255,255,.12);
      color: #ffffff;
      outline: none;
    }
    nav a:focus-visible {
      outline: 2px solid #EDA900;
      outline-offset: 2px;
    }

    /* ── Page content wrapper ───────────────────────────────── */
    .page-content {
      max-width: 760px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 4rem;
    }

    /* ── Typography ─────────────────────────────────────────── */
    h1 {
      font-family: 'DM Sans', Helvetica, Arial, sans-serif;
      font-size: 1.45rem;
      font-weight: 500;
      color: #002C73;             /* SUNY Blue — ~14:1 on white, passes AAA */
      border-bottom: 1px solid #d0d8e8;
      padding-bottom: .5rem;
      margin-top: 0;
      margin-bottom: 1.25rem;
    }

    h2 {
      font-family: 'DM Sans', Helvetica, Arial, sans-serif;
      font-size: .82rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: .09em;
      color: #4a5568;             /* #4a5568 on white = ~7.2:1 — passes AA */
      margin-top: 2.5rem;
      margin-bottom: .6rem;
    }

    h3 {
      font-family: 'DM Sans', Helvetica, Arial, sans-serif;
      font-size: .92rem;
      font-weight: 500;
      color: #1a1a1a;
      margin-bottom: .3rem;
    }

    p { margin: 0 0 1rem; }

    a {
      color: #1a4a8a;             /* #1a4a8a on white = ~7.1:1 — passes AA */
      text-decoration: underline;
      text-underline-offset: 2px;
    }
    a:hover { color: #002C73; }
    a:focus-visible {
      outline: 2px solid #002C73;
      outline-offset: 2px;
      border-radius: 2px;
    }

    /* ── Lists ──────────────────────────────────────────────── */
    ul { padding-left: 1.2rem; margin: 0 0 1rem; }
    li { margin-bottom: .35rem; }

    /* ── Card component ─────────────────────────────────────── */
    .card { margin: 1.1rem 0; }
    .card a { font-size: 1.02rem; }
    .card .desc { margin: .2rem 0 .1rem; font-size: .9rem; color: #333; }
    .card .meta { font-size: .78rem; color: #666; }  /* #666 on white = ~5.7:1 — passes AA */

    /* ── Tables ─────────────────────────────────────────────── */
    table { width: 100%; border-collapse: collapse; font-size: .9rem; margin: 1rem 0; }
    th {
      background: #002C73;
      color: #ffffff;
      font-family: 'DM Sans', Helvetica, Arial, sans-serif;
      font-weight: 500;
      font-size: .78rem;
      text-transform: uppercase;
      letter-spacing: .06em;
      padding: .5rem .75rem;
      text-align: left;
    }
    td { padding: .45rem .75rem; border-bottom: 1px solid #e8ecf2; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f4f7fb; }

    /* ── Footer ─────────────────────────────────────────────── */
    .site-footer {
      border-top: 1px solid #e0e6ef;
      padding: 1rem 1.5rem;
      max-width: 760px;
      margin: 0 auto;
      font-size: .78rem;
      color: #666;
      font-family: 'DM Sans', Helvetica, Arial, sans-serif;
    }
    .site-footer a { color: #1a4a8a; text-decoration: none; }
    .site-footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<header class="site-header" role="banner">
  <div class="site-header-inner">
    <a class="site-title" href="{{ site.baseurl }}/">Cameroon Workshops 2026</a>
    <nav aria-label="Site navigation">
      <a href="{{ site.baseurl }}/">Home</a>
      <a href="{{ site.baseurl }}/buea/">Buea</a>
      <a href="{{ site.baseurl }}/yaounde/">Yaoundé I</a>
      <a href="{{ site.baseurl }}/shared/">Resources</a>
    </nav>
  </div>
</header>

<main class="page-content" id="main-content">
  {{ content }}
</main>

<footer class="site-footer" role="contentinfo">
  <a href="https://sunypolyaix.github.io/">AIX Center</a> ·
  <a href="https://github.com/sunypolyaix/cameroon-workshops-2026">GitHub</a> ·
  SUNY Polytechnic Institute · Utica, NY
</footer>

</body>
</html>
