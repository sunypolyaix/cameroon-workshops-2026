<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zotero Setup — Generate Your Guide | AIX Research Workshop</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      background: #ffffff;
      color: #1a1a2e;
    }
    a { color: #1a3a6b; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const BASE_PROMPT = (os, browser, folder) =>
`Generate a step-by-step Zotero setup guide for a researcher. Cover:

(1) Installing Zotero Desktop with the data directory moved to an easy-to-find location — my OS is ${os} and I want the Zotero folder at ${folder};

(2) Installing the Zotero Connector browser extension for ${browser};

(3) Testing the connector by capturing an open-access article, a Google Scholar result, and a result from my university library — confirming a PDF attaches each time;

(4) Generating a .bib bibliography with an LLM and importing it into Zotero, with a verification step for each imported record;

(5) Finding and attaching full-text PDFs for records that are missing them.

Include the critical warning that the Zotero data directory must NOT be placed inside Google Drive, Dropbox, or any other cloud sync folder (SQLite database corruption risk). Use Zotero Sync for metadata instead.`;

    const OS_OPTIONS = ["macOS", "Windows", "Linux (Ubuntu)", "Linux (other)"];
    const BROWSER_OPTIONS = ["Chrome", "Firefox", "Brave", "Edge", "Safari (macOS only)"];
    const FOLDER_DEFAULTS = {
      "macOS":          "~/documents/zotero",
      "Windows":        "c:\\users\\[yourname]\\documents\\zotero",
      "Linux (Ubuntu)": "~/documents/zotero",
      "Linux (other)":  "~/documents/zotero",
    };

    const S = {
      header: {
        background: "#1a3a6b",
        color: "#ffffff",
        padding: "28px 32px 24px",
        borderBottom: "3px solid #f59e0b",
      },
      eyebrow: {
        fontSize: "11px",
        letterSpacing: "0.12em",
        textTransform: "uppercase",
        color: "#93b4df",
        marginBottom: "8px",
      },
      h1: { fontSize: "22px", fontWeight: 700, lineHeight: 1.25 },
      subtitle: { margin: "8px 0 0", fontSize: "14px", color: "#b8cfe8", lineHeight: 1.5 },
      body: { padding: "28px 32px", maxWidth: "680px" },
      provenance: {
        background: "#f8f9ff",
        border: "1px solid #dde3f0",
        borderLeft: "3px solid #1a3a6b",
        borderRadius: "4px",
        padding: "12px 16px",
        fontSize: "12px",
        color: "#555",
        marginBottom: "28px",
        lineHeight: 1.6,
      },
      sectionHead: {
        fontSize: "15px",
        fontWeight: 600,
        marginBottom: "18px",
        color: "#1a3a6b",
        letterSpacing: "0.02em",
      },
      grid: { display: "grid", gap: "16px", marginBottom: "24px" },
      label: {
        display: "block",
        fontSize: "12px",
        fontWeight: 600,
        color: "#444",
        marginBottom: "6px",
        letterSpacing: "0.04em",
        textTransform: "uppercase",
      },
      select: {
        width: "100%",
        padding: "10px 12px",
        border: "1.5px solid #c8d4e8",
        borderRadius: "6px",
        fontSize: "14px",
        background: "#fff",
        color: "#1a1a2e",
        cursor: "pointer",
        appearance: "auto",
      },
      input: {
        width: "100%",
        padding: "10px 12px",
        border: "1.5px solid #c8d4e8",
        borderRadius: "6px",
        fontSize: "13px",
        fontFamily: "'JetBrains Mono', 'Fira Code', 'Courier New', monospace",
        background: "#fff",
        color: "#1a1a2e",
      },
      hint: { fontSize: "11px", color: "#888", marginTop: "5px" },
      promptHeader: {
        display: "flex",
        justifyContent: "space-between",
        alignItems: "center",
        marginBottom: "8px",
      },
      promptLabel: {
        fontSize: "12px",
        fontWeight: 600,
        color: "#444",
        textTransform: "uppercase",
        letterSpacing: "0.04em",
      },
      promptBox: {
        background: "#f4f6fb",
        border: "1.5px solid #dde3f0",
        borderRadius: "6px",
        padding: "18px",
        fontFamily: "'JetBrains Mono', 'Fira Code', 'Courier New', monospace",
        fontSize: "12.5px",
        lineHeight: "1.75",
        color: "#2a3a5e",
        whiteSpace: "pre-wrap",
        wordBreak: "break-word",
        marginBottom: "16px",
      },
      tip: {
        background: "#fffbeb",
        border: "1px solid #fde68a",
        borderRadius: "6px",
        padding: "14px 16px",
        fontSize: "13px",
        color: "#78350f",
        lineHeight: 1.6,
        marginBottom: "28px",
      },
      backLink: {
        display: "inline-block",
        fontSize: "13px",
        color: "#1a3a6b",
        textDecoration: "none",
        borderBottom: "1px solid #c8d4e8",
        paddingBottom: "1px",
      },
      footer: {
        borderTop: "1px solid #e8edf5",
        padding: "16px 32px",
        fontSize: "11px",
        color: "#999",
        lineHeight: 1.6,
      },
    };

    function CopyButton({ text }) {
      const [copied, setCopied] = useState(false);
      const handle = async () => {
        await navigator.clipboard.writeText(text);
        setCopied(true);
        setTimeout(() => setCopied(false), 2200);
      };
      return (
        <button onClick={handle} style={{
          background: copied ? "#166534" : "#f59e0b",
          color: copied ? "#fff" : "#1a1a2e",
          border: "none",
          borderRadius: "6px",
          padding: "8px 18px",
          fontSize: "13px",
          fontWeight: 700,
          cursor: "pointer",
          letterSpacing: "0.02em",
          transition: "background 0.2s, color 0.2s",
          display: "flex",
          alignItems: "center",
          gap: "7px",
          flexShrink: 0,
        }}>
          {copied ? "✓ Copied!" : "⧉ Copy Prompt"}
        </button>
      );
    }

    function App() {
      const [os, setOs]           = useState("macOS");
      const [browser, setBrowser] = useState("Chrome");
      const [folder, setFolder]   = useState(FOLDER_DEFAULTS["macOS"]);

      const handleOsChange = (val) => {
        setOs(val);
        setFolder(FOLDER_DEFAULTS[val] || "~/documents/zotero");
        if ((val === "Windows" || val.startsWith("Linux")) && browser === "Safari (macOS only)") {
          setBrowser("Chrome");
        }
      };

      const browsers = BROWSER_OPTIONS.filter(b =>
        !(os !== "macOS" && b === "Safari (macOS only)")
      );

      const prompt = BASE_PROMPT(os, browser, folder);

      return (
        <div>
          {/* Header */}
          <div style={S.header}>
            <div style={S.eyebrow}>SUNY Poly AIX Research Workshop</div>
            <h1 style={S.h1}>Zotero Setup — Generate Your Guide</h1>
            <p style={S.subtitle}>
              Fill in your system details below, copy the customized prompt, and paste it into Claude, Gemini, or ChatGPT to get a personalized installation guide.
            </p>
          </div>

          {/* Body */}
          <div style={S.body}>

            {/* Provenance */}
            <div style={S.provenance}>
              <strong style={{ color: "#1a3a6b" }}>Document provenance</strong><br />
              The Zotero setup guide was generated by <strong>Claude Sonnet 4.6</strong> on <strong>June 28, 2026</strong> from a single natural-language prompt. The prompt below is a parameterized version of that original — fill in your details to generate your own copy.
            </div>

            {/* Form */}
            <h2 style={S.sectionHead}>Customize your prompt</h2>
            <div style={S.grid}>

              <div>
                <label style={S.label}>Operating System</label>
                <select style={S.select} value={os} onChange={e => handleOsChange(e.target.value)}>
                  {OS_OPTIONS.map(o => <option key={o}>{o}</option>)}
                </select>
              </div>

              <div>
                <label style={S.label}>Browser</label>
                <select style={S.select} value={browser} onChange={e => setBrowser(e.target.value)}>
                  {browsers.map(b => <option key={b}>{b}</option>)}
                </select>
              </div>

              <div>
                <label style={S.label}>Zotero Folder Location</label>
                <input
                  type="text"
                  style={S.input}
                  value={folder}
                  onChange={e => setFolder(e.target.value)}
                />
                <div style={S.hint}>⚠️ Do not use a path inside Google Drive, Dropbox, or iCloud — the Zotero SQLite database will corrupt.</div>
              </div>

            </div>

            {/* Prompt output */}
            <div style={S.promptHeader}>
              <span style={S.promptLabel}>Your customized prompt</span>
              <CopyButton text={prompt} />
            </div>
            <div style={S.promptBox}>{prompt}</div>

            {/* Tip */}
            <div style={S.tip}>
              <strong>Paste into:</strong> Claude (claude.ai) · Gemini (gemini.google.com) · ChatGPT (chatgpt.com)<br />
              The model will return a complete, step-by-step Zotero setup guide tailored to your system.
            </div>

            {/* Back link */}
            <a href="zotero-setup-guide.md" style={S.backLink}>← Back to setup guide</a>

          </div>

          {/* Footer */}
          <div style={S.footer}>
            SUNY Poly AIX Research Workshop ·
            Zotero group library: <a href="https://www.zotero.org/groups/6596845/ai-tools-for-research">zotero.org/groups/6596845/ai-tools-for-research</a>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
