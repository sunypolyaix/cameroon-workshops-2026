<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Session 1 — Cameroon Workshops 2026</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0; padding: 0;
      font-family: Georgia, serif;
      font-size: 1rem;
      line-height: 1.65;
      color: #1a1a1a;
      background: #fff;
    }

    /* ── Top bar ── */
    .site-header {
      background: #0039A6;
      border-bottom: 3px solid #EDA900;
      padding: 0 1.5rem;
    }
    .site-header-inner {
      max-width: 760px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 3rem;
    }
    .site-title {
      font-family: 'DM Sans', Helvetica, sans-serif;
      font-size: .78rem;
      font-weight: 500;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: #fff;
      text-decoration: none;
    }
    .site-nav a {
      font-family: 'DM Sans', Helvetica, sans-serif;
      font-size: .78rem;
      color: #c8d8f8;
      text-decoration: none;
      padding: .55rem .6rem;
    }
    .site-nav a:hover { color: #fff; }

    /* ── Selector bar ── */
    .selector-bar {
      background: #f4f7fb;
      border-bottom: 1px solid #d0d8e8;
      padding: 0 1.5rem;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .selector-inner {
      max-width: 760px;
      margin: 0 auto;
      display: flex;
      flex-wrap: wrap;
      gap: 0;
    }
    .group-label {
      font-family: 'DM Sans', Helvetica, sans-serif;
      font-size: .7rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: #888;
      padding: .9rem .75rem .4rem;
      width: 100%;
      margin-bottom: -.4rem;
    }
    .tab-group {
      display: flex;
      flex-wrap: wrap;
      gap: 0;
      width: 100%;
      padding-bottom: .4rem;
    }
    .tab {
      font-family: 'DM Sans', Helvetica, sans-serif;
      font-size: .8rem;
      color: #444;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      padding: .45rem .85rem;
      cursor: pointer;
      white-space: nowrap;
      transition: color .15s, border-color .15s;
    }
    .tab:hover { color: #0039A6; }
    .tab.active {
      color: #0039A6;
      border-bottom-color: #0039A6;
      font-weight: 500;
    }

    /* ── Content ── */
    .content-area {
      max-width: 760px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 4rem;
    }

    /* rendered markdown styles */
    .content-area h1 {
      font-family: 'DM Sans', Helvetica, sans-serif;
      font-size: 1.45rem;
      font-weight: 500;
      color: #0039A6;
      border-bottom: 1px solid #d0d8e8;
      padding-bottom: .5rem;
      margin-top: 0;
    }
    .content-area h2 {
      font-family: 'DM Sans', Helvetica, sans-serif;
      font-size: .82rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: .09em;
      color: #4a5568;
      margin-top: 2.5rem;
    }
    .content-area h3 {
      font-family: 'DM Sans', Helvetica, sans-serif;
      font-size: .95rem;
      font-weight: 500;
      color: #1a1a1a;
    }
    .content-area a { color: #1a4a8a; }
    .content-area a:hover { color: #0039A6; }
    .content-area ul, .content-area ol { padding-left: 1.2rem; }
    .content-area li { margin-bottom: .35rem; }
    .content-area code {
      font-size: .88em;
      background: #f0f4fb;
      padding: .1em .35em;
      border-radius: 3px;
    }
    .content-area pre {
      background: #f0f4fb;
      padding: 1rem;
      border-radius: 4px;
      overflow-x: auto;
    }
    .content-area pre code { background: none; padding: 0; }
    .content-area table { width: 100%; border-collapse: collapse; font-size: .9rem; margin: 1rem 0; }
    .content-area th {
      background: #0039A6; color: #fff;
      font-family: 'DM Sans', Helvetica, sans-serif;
      font-size: .78rem; text-transform: uppercase; letter-spacing: .06em;
      padding: .5rem .75rem; text-align: left;
    }
    .content-area td { padding: .45rem .75rem; border-bottom: 1px solid #e8ecf2; }
    .content-area blockquote {
      border-left: 3px solid #EDA900;
      margin: 1rem 0;
      padding: .5rem 1rem;
      color: #555;
      font-style: italic;
    }

    /* loading state */
    .loading { color: #aaa; font-style: italic; }

    /* ── Footer ── */
    .site-footer {
      border-top: 1px solid #e0e6ef;
      padding: 1rem 1.5rem;
      max-width: 760px;
      margin: 0 auto;
      font-size: .78rem;
      color: #666;
      font-family: 'DM Sans', Helvetica, sans-serif;
    }
    .site-footer a { color: #1a4a8a; text-decoration: none; }
    .site-footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<header class="site-header">
  <div class="site-header-inner">
    <a class="site-title" href="../">Cameroon Workshops 2026</a>
    <nav class="site-nav">
      <a href="../">Home</a>
      <a href="../buea/">Buea</a>
      <a href="../yaounde/">Yaoundé I</a>
      <a href="./">Resources</a>
    </nav>
  </div>
</header>

<div class="selector-bar" role="navigation" aria-label="Session 1 documents">
  <div class="selector-inner">

    <div class="group-label">First Steps</div>
    <div class="tab-group">
      <button class="tab" data-src="cameroon-workshops-2026/session1/first-steps/principles.md">Core Principles</button>
      <button class="tab" data-src="cameroon-workshops-2026/session1/first-steps/prompts.md">Prompts to Try</button>
      <button class="tab" data-src="cameroon-workshops-2026/session1/first-steps/step-2-orienting.md">Step 2: Orienting</button>
      <button class="tab" data-src="cameroon-workshops-2026/session1/first-steps/live-examples.md">Live Examples</button>
    </div>

    <div class="group-label">AI-First Lit Review</div>
    <div class="tab-group">
      <button class="tab" data-src="cameroon-workshops-2026/session1/ai-first-litreview/llm-utility.md">LLM Utility</button>
      <button class="tab" data-src="cameroon-workshops-2026/session1/ai-first-litreview/workflow.md">Five-Step Workflow</button>
      <button class="tab" data-src="cameroon-workshops-2026/session1/ai-first-litreview/toolkit.md">Toolkit</button>
      <button class="tab" data-src="cameroon-workshops-2026/session1/ai-first-litreview/closing.md">What You Can't Hand Off</button>
    </div>

  </div>
</div>

<main class="content-area" id="content">
  <p class="loading">Select a document above.</p>
</main>

<footer class="site-footer">
  <a href="https://sunypolyaix.github.io/">AIX Center</a> ·
  <a href="https://github.com/sunypolyaix/cameroon-workshops-2026">GitHub</a> ·
  SUNY Polytechnic Institute · Utica, NY
</footer>

<script>
  const content = document.getElementById('content');
  const tabs = document.querySelectorAll('.tab');

  function stripFrontMatter(text) {
    // Remove YAML front matter (--- ... ---)
    return text.replace(/^---[\s\S]*?---\n?/, '').trim();
  }

  async function loadDoc(src, btn) {
    content.innerHTML = '<p class="loading">Loading…</p>';
    tabs.forEach(t => t.classList.remove('active'));
    btn.classList.add('active');

    try {
      const res = await fetch(src);
      if (!res.ok) throw new Error(`${res.status}`);
      const raw = await res.text();
      const md = stripFrontMatter(raw);
      content.innerHTML = marked.parse(md);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    } catch (e) {
      content.innerHTML = `<p style="color:#c00">Could not load <code>${src}</code>: ${e.message}</p>`;
    }
  }

  tabs.forEach(btn => {
    btn.addEventListener('click', () => loadDoc(btn.dataset.src, btn));
  });

  // Load first tab on page open
  tabs[0].click();
</script>

</body>
</html>
